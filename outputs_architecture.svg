<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1180" viewBox="0 0 1680 1180" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="client" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="backend" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f87171"/><stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="ai" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="data" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="ext" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#fca5a5"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1680" height="1180" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="62" fill="#f1f5f9" font-size="40" font-weight="700">AegisFlow AI — System Architecture</text>
  <text x="60" y="94" fill="#94a3b8" font-size="19">Climate-resilient flood early-warning &amp; emergency response platform · Web + Mobile + AI</text>

  <!-- Legend -->
  <g font-size="14" fill="#cbd5e1">
    <rect x="1190" y="40" width="16" height="16" rx="3" fill="url(#client)"/><text x="1212" y="53">Clients</text>
    <rect x="1190" y="64" width="16" height="16" rx="3" fill="url(#backend)"/><text x="1212" y="77">Backend</text>
    <rect x="1300" y="40" width="16" height="16" rx="3" fill="url(#ai)"/><text x="1322" y="53">AI Service</text>
    <rect x="1300" y="64" width="16" height="16" rx="3" fill="url(#data)"/><text x="1322" y="77">Data</text>
    <rect x="1410" y="40" width="16" height="16" rx="3" fill="url(#ext)"/><text x="1432" y="53">External</text>
  </g>

  <!-- ============ LAYER 1: CLIENTS ============ -->
  <rect x="60" y="120" width="1560" height="220" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="80" y="150" fill="#7dd3fc" font-size="17" font-weight="700" letter-spacing="1">CLIENT LAYER</text>

  <!-- Web frontend -->
  <g filter="url(#shadow)">
    <rect x="90" y="170" width="480" height="150" rx="12" fill="url(#client)"/>
  </g>
  <text x="110" y="200" fill="#082f49" font-size="19" font-weight="700">Web Frontend</text>
  <text x="110" y="223" fill="#0c4a6e" font-size="14">Next.js 16 · React 19 · TypeScript · Tailwind</text>
  <g font-size="13" fill="#0c4a6e">
    <text x="110" y="252">• Public website (7 pages)</text>
    <text x="110" y="272">• Citizen app (9 pages)</text>
    <text x="320" y="252">• Admin dashboard (14 pages)</text>
    <text x="320" y="272">• Rescue team views (3 pages)</text>
    <text x="110" y="298" fill="#075985" font-weight="600">next-intl i18n (Vi/En) · Laravel Echo (WebSocket)</text>
  </g>

  <!-- Mobile -->
  <g filter="url(#shadow)">
    <rect x="600" y="170" width="480" height="150" rx="12" fill="url(#client)"/>
  </g>
  <text x="620" y="200" fill="#082f49" font-size="19" font-weight="700">Mobile App</text>
  <text x="620" y="223" fill="#0c4a6e" font-size="14">React Native 0.81 · iOS + Android</text>
  <g font-size="13" fill="#0c4a6e">
    <text x="620" y="252">• Citizen tabs + SOS (37 screens)</text>
    <text x="620" y="272">• Emergency / rescue team flows</text>
    <text x="620" y="298" fill="#075985" font-weight="600">Mapbox · Pusher.js · FCM push · i18n</text>
  </g>

  <!-- User personas -->
  <g filter="url(#shadow)"><rect x="1110" y="170" width="480" height="150" rx="12" fill="#0b3a52"/></g>
  <text x="1130" y="200" fill="#7dd3fc" font-size="17" font-weight="700">Users</text>
  <g font-size="14" fill="#bae6fd">
    <text x="1130" y="230">🧍 Citizens — alerts, reports, evacuation</text>
    <text x="1130" y="256">🏛️ City operators — monitor &amp; dispatch</text>
    <text x="1130" y="282">🚑 Rescue teams — missions &amp; routing</text>
    <text x="1130" y="308">🌐 Public — transparency &amp; info</text>
  </g>

  <!-- ============ LAYER 2: BACKEND ============ -->
  <rect x="60" y="400" width="1010" height="300" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="80" y="430" fill="#fca5a5" font-size="17" font-weight="700" letter-spacing="1">APPLICATION / BACKEND LAYER</text>

  <g filter="url(#shadow)"><rect x="90" y="450" width="940" height="230" rx="12" fill="url(#backend)"/></g>
  <text x="110" y="482" fill="#450a0a" font-size="20" font-weight="700">Laravel 13 API  ·  PHP 8.3</text>
  <text x="110" y="506" fill="#7f1d1d" font-size="14">REST API — 61+ endpoints · Sanctum auth · 31 Eloquent models · 26 migrations</text>

  <!-- inner service cards -->
  <g font-size="13.5">
    <rect x="110" y="524" width="285" height="64" rx="9" fill="#fee2e2"/>
    <text x="125" y="548" fill="#991b1b" font-weight="700">Core Services</text>
    <text x="125" y="568" fill="#7f1d1d">FloodAutoDetector · RecommendationGenerator</text>
    <text x="125" y="583" fill="#7f1d1d">AIServiceClient</text>

    <rect x="410" y="524" width="285" height="64" rx="9" fill="#fee2e2"/>
    <text x="425" y="548" fill="#991b1b" font-weight="700">Realtime Events</text>
    <text x="425" y="568" fill="#7f1d1d">10 broadcast events (PredictionReceived,</text>
    <text x="425" y="583" fill="#7f1d1d">AlertCreated, MissionAssigned…)</text>

    <rect x="710" y="524" width="305" height="64" rx="9" fill="#fee2e2"/>
    <text x="725" y="548" fill="#991b1b" font-weight="700">Jobs &amp; Scheduler</text>
    <text x="725" y="568" fill="#7f1d1d">Queue workers · scheduled prediction</text>
    <text x="725" y="583" fill="#7f1d1d">cycle (every 15 min)</text>
  </g>
  <g font-size="13.5">
    <rect x="110" y="600" width="905" height="62" rx="9" fill="#fecaca"/>
    <text x="125" y="624" fill="#991b1b" font-weight="700">20+ Controllers</text>
    <text x="125" y="645" fill="#7f1d1d">Incidents · Alerts · Rescue requests · Teams · Sensors · Predictions · Recommendations · Shelters · Flood zones · Users · Analytics</text>
  </g>

  <!-- ============ LAYER 2b: AI SERVICE ============ -->
  <rect x="1100" y="400" width="520" height="300" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="1120" y="430" fill="#c4b5fd" font-size="17" font-weight="700" letter-spacing="1">AI / ML LAYER</text>

  <g filter="url(#shadow)"><rect x="1130" y="450" width="460" height="230" rx="12" fill="url(#ai)"/></g>
  <text x="1150" y="482" fill="#2e1065" font-size="20" font-weight="700">FastAPI AI Service</text>
  <text x="1150" y="506" fill="#4c1d95" font-size="14">Python 3.9 · scikit-learn · 4 endpoints · :8080</text>

  <g font-size="13.5">
    <rect x="1150" y="524" width="420" height="58" rx="9" fill="#ede9fe"/>
    <text x="1165" y="547" fill="#5b21b6" font-weight="700">RandomForest Flood Classifier</text>
    <text x="1165" y="567" fill="#6d28d9">F1 = 0.9886 · AUC 0.9996 · 4 risk levels · 45ms</text>

    <rect x="1150" y="592" width="420" height="74" rx="9" fill="#ede9fe"/>
    <text x="1165" y="615" fill="#5b21b6" font-weight="700">Algorithms</text>
    <text x="1165" y="635" fill="#6d28d9">flood_calculator · priority_calculator</text>
    <text x="1165" y="653" fill="#6d28d9">shelter_calculator · route_optimizer</text>
  </g>

  <!-- ============ LAYER 3: REALTIME + DATA ============ -->
  <rect x="60" y="760" width="1010" height="240" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="80" y="790" fill="#6ee7b7" font-size="17" font-weight="700" letter-spacing="1">DATA &amp; REALTIME LAYER</text>

  <g filter="url(#shadow)"><rect x="90" y="810" width="300" height="160" rx="12" fill="url(#data)"/></g>
  <text x="110" y="842" fill="#064e3b" font-size="19" font-weight="700">MySQL 8.0</text>
  <text x="110" y="866" fill="#065f46" font-size="13.5">aegisflow_db · :3306</text>
  <g font-size="13" fill="#065f46">
    <text x="110" y="894">• Geospatial flood data</text>
    <text x="110" y="914">• sensor_readings · predictions</text>
    <text x="110" y="934">• incidents · alerts · recommendations</text>
    <text x="110" y="954">• 31 relational models</text>
  </g>

  <g filter="url(#shadow)"><rect x="410" y="810" width="290" height="160" rx="12" fill="url(#data)"/></g>
  <text x="430" y="842" fill="#064e3b" font-size="19" font-weight="700">Redis</text>
  <text x="430" y="866" fill="#065f46" font-size="13.5">in-memory store</text>
  <g font-size="13" fill="#065f46">
    <text x="430" y="894">• Cache driver</text>
    <text x="430" y="914">• Session store</text>
    <text x="430" y="934">• Queue backend</text>
  </g>

  <g filter="url(#shadow)"><rect x="720" y="810" width="310" height="160" rx="12" fill="#0e7490"/></g>
  <text x="740" y="842" fill="#ecfeff" font-size="19" font-weight="700">Laravel Reverb</text>
  <text x="740" y="866" fill="#cffafe" font-size="13.5">WebSocket server · ws://:8080</text>
  <g font-size="13" fill="#cffafe">
    <text x="740" y="894">• Broadcast channels</text>
    <text x="740" y="914">• prediction.all · alerts · missions</text>
    <text x="740" y="934">• Pushes live updates to clients</text>
  </g>

  <!-- ============ EXTERNAL ============ -->
  <rect x="1100" y="760" width="520" height="240" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="1120" y="790" fill="#fcd34d" font-size="17" font-weight="700" letter-spacing="1">EXTERNAL SERVICES &amp; SOURCES</text>

  <g filter="url(#shadow)"><rect x="1130" y="810" width="220" height="74" rx="11" fill="url(#ext)"/></g>
  <text x="1148" y="840" fill="#451a03" font-size="16" font-weight="700">IoT Sensors</text>
  <text x="1148" y="863" fill="#78350f" font-size="13">Water level · rainfall · tide</text>

  <g filter="url(#shadow)"><rect x="1370" y="810" width="220" height="74" rx="11" fill="url(#ext)"/></g>
  <text x="1388" y="840" fill="#451a03" font-size="16" font-weight="700">Firebase FCM</text>
  <text x="1388" y="863" fill="#78350f" font-size="13">Push notifications</text>

  <g filter="url(#shadow)"><rect x="1130" y="900" width="220" height="74" rx="11" fill="url(#ext)"/></g>
  <text x="1148" y="930" fill="#451a03" font-size="16" font-weight="700">Mapbox</text>
  <text x="1148" y="953" fill="#78350f" font-size="13">Maps &amp; navigation</text>

  <g filter="url(#shadow)"><rect x="1370" y="900" width="220" height="74" rx="11" fill="url(#ext)"/></g>
  <text x="1388" y="930" fill="#451a03" font-size="16" font-weight="700">VNMHA Data</text>
  <text x="1388" y="953" fill="#78350f" font-size="13">Da Nang 2019–2024</text>

  <!-- ============ CONNECTIONS ============ -->
  <!-- Clients -> Backend (REST) -->
  <path d="M330,320 L330,450" stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="340" y="388" fill="#cbd5e1" font-size="13">HTTPS / REST</text>
  <path d="M840,320 L640,450" stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="690" y="386" fill="#cbd5e1" font-size="13">REST API</text>

  <!-- Reverb -> Clients (WebSocket realtime, upward) -->
  <path d="M875,810 L875,360 L760,360 L760,322" stroke="#22d3ee" stroke-width="2.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="7 5"/>
  <text x="885" y="560" fill="#67e8f9" font-size="13">WebSocket live updates</text>

  <!-- Backend <-> AI -->
  <path d="M1030,560 L1130,560" stroke="#fca5a5" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M1130,590 L1030,590" stroke="#c4b5fd" stroke-width="2.5" fill="none" marker-end="url(#arrowR)"/>
  <text x="1038" y="552" fill="#fecaca" font-size="12.5">predict-risk</text>
  <text x="1040" y="608" fill="#ddd6fe" font-size="12.5">risk + score</text>

  <!-- Backend -> MySQL -->
  <path d="M300,680 L260,810" stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="120" y="752" fill="#cbd5e1" font-size="13">Eloquent ORM</text>
  <!-- Backend -> Redis -->
  <path d="M540,680 L555,810" stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="565" y="752" fill="#cbd5e1" font-size="13">cache/queue</text>
  <!-- Backend -> Reverb -->
  <path d="M820,680 L850,810" stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="865" y="752" fill="#cbd5e1" font-size="13">broadcast</text>

  <!-- Sensors -> Backend -->
  <path d="M1240,810 L1240,720 L1015,640" stroke="#fcd34d" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="1055" y="700" fill="#fde68a" font-size="12.5">POST sensor-data</text>

  <!-- FCM -> Mobile (via backend) -->
  <path d="M1480,810 L1480,150 L1080,150 L920,170" stroke="#fcd34d" stroke-width="2.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="7 5"/>
  <text x="1190" y="142" fill="#fde68a" font-size="12.5">push notifications</text>

  <!-- VNMHA -> AI (training) -->
  <path d="M1480,900 L1480,690" stroke="#fcd34d" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="1490" y="800" fill="#fde68a" font-size="12.5">training data</text>

  <!-- Mapbox -> clients -->
  <path d="M1240,900 L1240,335" stroke="#fcd34d" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="4 4" opacity="0.7"/>
  <text x="1248" y="640" fill="#fde68a" font-size="12">maps SDK</text>

  <!-- footer -->
  <text x="60" y="1040" fill="#475569" font-size="14">Containerized with Docker Compose · shared bridge network · monorepo (frontend / backend / mobile / ai-service)</text>
  <text x="60" y="1062" fill="#475569" font-size="13">Real-time flow: Sensors → AI prediction (15 min) → broadcast event → operator approval → citizen/team alerts → dispatch &amp; routing → resolution</text>
</svg>
